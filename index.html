<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HOY</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;

  font-family: 'Anton', sans-serif;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  position: relative;
}

/* fondo real */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/XqYXdCe.jpg") center/cover no-repeat;
  z-index: 0;
}

/* overlay negro (ESTO reemplaza el ::before) */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: 1;
}

/* contenido */
.content {
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 130px;
  letter-spacing: 8px;
}

#timer {
  font-size: 50px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
  <h1>HOY</h1>
  <div id="timer">00:00:00</div>
</div>

<script>
function updateTimer(){
  const now = new Date();
  const target = new Date();
  target.setHours(14,40,0,0);

  let diff = target - now;

  if(diff <= 0){
    document.getElementById("timer").innerText = "00:00:00";
    return;
  }

  let h = Math.floor(diff/3600000);
  let m = Math.floor((diff%3600000)/60000);
  let s = Math.floor((diff%60000)/1000);

  document.getElementById("timer").innerText =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>

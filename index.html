<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Backrooms - Oficinas Amarillas</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: #3a2f1b;

  /* Fondo amarillo tipo Backrooms */
  background-color: #f3e7a1;

  background-image:
    repeating-linear-gradient(
      90deg,
      rgba(0,0,0,0.03) 0px,
      rgba(0,0,0,0.03) 2px,
      transparent 2px,
      transparent 6px
    ),
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.02) 0px,
      rgba(0,0,0,0.02) 3px,
      transparent 3px,
      transparent 8px
    ),
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,0.06), transparent 50%);

  background-blend-mode: multiply;
}

/* Luz fluorescente arriba */
.fluorescente {
  position: absolute;
  top: 0;
  width: 100%;
  height: 90px;
  background: rgba(255,255,210,0.65);
  box-shadow: 0 0 60px rgba(255,255,210,0.5);
  animation: flicker 2s infinite;
}

/* parpadeo de luz */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.7; }
  100% { opacity: 1; }
}

/* Contenedor central */
.container {
  text-align: center;
  padding: 30px;
  border: 3px solid #c2b280;
  background: rgba(255, 255, 210, 0.35);
  box-shadow: 0 0 25px rgba(0,0,0,0.25);
  z-index: 2;
}

/* Texto principal */
h1 {
  font-size: 55px;
  letter-spacing: 12px;
  margin: 0;
}

/* PRONTO parpadeante */
.pronto {
  margin-top: 20px;
  font-size: 32px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<div class="fluorescente"></div>

<div class="container">
  <h1>BACKROOMS</h1>
  <div class="pronto">PRONTO</div>
</div>

</body>
</html>
